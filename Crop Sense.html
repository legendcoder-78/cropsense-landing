<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Sense</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar / Controls -->
        <aside class="sidebar glass-panel">
            <div class="logo-area">
                <div class="logo-icon">🌱</div>
                <h1>EcoSupply Risk Map</h1>
            </div>

            <div class="control-section">
                <h2>Crop Selection</h2>
                <p class="subtitle">Select a crop to view its risk profile</p>
                <select id="crop-selector" class="custom-select">
                    <option value="wheat">Wheat</option>
                    <option value="rice">Rice</option>
                    <option value="cotton">Cotton</option>
                    <option value="maize">Maize (Corn)</option>
                    <option value="sugarcane">Sugarcane</option>
                    <option value="tea">Tea</option>
                    <option value="jute">Jute</option>
                </select>
            </div>

            <div class="control-section simulation-controls">
                <h2>Climate Risk Predictor</h2>
                <p class="subtitle">Simulate climate conditions for AI logic</p>

                <div class="slider-group">
                    <label for="temp-slider">Temperature (°C): <span id="temp-val">25</span></label>
                    <input type="range" id="temp-slider" min="10" max="50" value="25" class="slider">
                </div>

                <div class="slider-group">
                    <label for="rain-slider">Rainfall (mm): <span id="rain-val">100</span></label>
                    <input type="range" id="rain-slider" min="0" max="300" value="100" class="slider">
                </div>
            </div>

            <div class="control-section results-section glass-panel-inner">
                <h2>AI Risk Analysis</h2>
                <div class="risk-badge" id="risk-badge">
                    <span class="status-dot"></span>
                    <span id="risk-text">Validating...</span>
                </div>
                <div class="insight-box" id="insight-box">
                    System analyzing current climate vs crop resilience...
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container glass-panel">
            <header class="map-header">
                <div class="header-info">
                    <span class="crop-name-display" id="crop-name-display">Wheat</span>
                    <span class="region-info">| India Region Overview</span>
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="color-box healthy"></span> Healthy</div>
                    <div class="legend-item"><span class="color-box risk"></span> At Risk</div>
                    <div class="legend-item"><span class="color-box fail"></span> Failed</div>
                </div>
            </header>
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Application Logic -->
    <script src="data.js"></script>
    <script src="map.js"></script>
    <script src="app.js"></script>
</body>

</html>
